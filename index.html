<!DOCTYPE html>
<html lang="en">
<head>

    <title>Fenodol</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://kit.fontawesome.com/4c9962e02c.js" crossorigin="anonymous"></script>

<body>
    <nav>
        <a href="/" class="logo">
            <img src="logo.png" alt="Fenodol">

            </div>
            <p>La plataforma de capacitación que te ayudará a mejorar tus habilidades de manera fácil y rápida.</p>
            <div class="actions">
                <button class="button button-b">
                    <i class="fa-solid fa-video"></i>
                    Ver Tutorial
                </button>
                <button class="button">Comienza Ahora</button>
            </div>
        </div>
        <a href="" class="banner">

        <div class="video viewed"></div>
